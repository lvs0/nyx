<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- NYX monogram: lune croissante + signal scan -->
  <defs>
    <linearGradient id="nyx-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f5d4"/>
      <stop offset="50%" stop-color="#9d4edd"/>
      <stop offset="100%" stop-color="#ff3d8c"/>
    </linearGradient>
    <filter id="nyx-bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- circle background (planet) -->
  <circle cx="128" cy="128" r="110" stroke="url(#nyx-g)" stroke-width="3" filter="url(#nyx-bloom)" opacity="0.95"/>
  <circle cx="128" cy="128" r="110" stroke="url(#nyx-g)" stroke-width="3" opacity="1"/>

  <!-- inner data ring -->
  <circle cx="128" cy="128" r="78" stroke="rgba(0,245,212,0.4)" stroke-width="1" stroke-dasharray="2 4"/>

  <!-- crescent moon -->
  <path d="M 165 50 A 95 95 0 1 0 165 206 A 70 70 0 1 1 165 50 Z" fill="url(#nyx-g)" opacity="0.95"/>

  <!-- scan lines: signal -->
  <line x1="48" y1="128" x2="208" y2="128" stroke="url(#nyx-g)" stroke-width="1.5" opacity="0.6"/>
  <line x1="128" y1="48" x2="128" y2="208" stroke="url(#nyx-g)" stroke-width="1.5" opacity="0.6"/>

  <!-- North star: 4 points en croix -->
  <circle cx="128" cy="128" r="6" fill="var(--nyx-void, #05060a)"/>
  <path d="M 124 128 L 132 128 M 128 124 L 128 132" stroke="#00f5d4" stroke-width="2"/>
</svg>
